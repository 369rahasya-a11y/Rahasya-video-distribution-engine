# .github/workflows/distribute-manual.yml
# Rahasya Video Distribution Engine — Manual Publishing
# Trigger from GitHub Actions UI with full control over limits and mode.

name: Distribute Videos (Manual)

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: 'Run mode'
        required: true
        default: 'TEST'
        type: choice
        options:
          - TEST
          - PRODUCTION

      facebook_limit:
        description: 'Facebook video limit (0 = disabled)'
        required: false
        default: '1'

      instagram_limit:
        description: 'Instagram video limit (0 = disabled)'
        required: false
        default: '1'

      threads_limit:
        description: 'Threads video limit (0 = disabled)'
        required: false
        default: '1'

      pinterest_limit:
        description: 'Pinterest video limit (0 = disabled)'
        required: false
        default: '1'

      youtube_limit:
        description: 'YouTube video limit (0 = disabled)'
        required: false
        default: '1'

      tiktok_limit:
        description: 'TikTok video limit (0 = disabled)'
        required: false
        default: '0'

jobs:
  distribute:
    name: Manual Distribution Run
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Run Distribution Engine
        env:
          # Supabase
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

          # Platform limits — overridden by manual inputs
          FACEBOOK_VIDEO_LIMIT: ${{ github.event.inputs.facebook_limit }}
          INSTAGRAM_VIDEO_LIMIT: ${{ github.event.inputs.instagram_limit }}
          THREADS_VIDEO_LIMIT: ${{ github.event.inputs.threads_limit }}
          PINTEREST_VIDEO_LIMIT: ${{ github.event.inputs.pinterest_limit }}
          YOUTUBE_VIDEO_LIMIT: ${{ github.event.inputs.youtube_limit }}
          TIKTOK_VIDEO_LIMIT: ${{ github.event.inputs.tiktok_limit }}

          # Facebook
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}

          # Instagram
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}

          # Threads
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}

          # Pinterest
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_ID: ${{ secrets.PINTEREST_BOARD_ID }}

          # YouTube
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}

          # TikTok
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}

          # Run mode
          RUN_MODE: ${{ github.event.inputs.run_mode }}

        run: node dist/index.js distribute

      - name: Upload distribution report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: manual-distribution-report-${{ github.run_id }}
          path: |
            output/report.json
            output/distribution.log
            output/errors.log
          retention-days: 30

      - name: Display report summary
        if: always()
        run: |
          if [ -f output/report.json ]; then
            echo "=== Distribution Report ==="
            cat output/report.json
          else
            echo "No report generated."
          fi
